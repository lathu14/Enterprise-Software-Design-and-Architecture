# Server Configuration
server.port=8084

# Application Name
spring.application.name=vehicle-payment-service

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/vehicle_payment_db
spring.datasource.username=postgres
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=org.postgresql.Driver
@
# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Other Microservice URLs
services.rental-service.url=http://localhost:8083

# Logging
logging.level.com.hotel=DEBUG
logging.level.org.springframework=INFO

# Stripe Configuration
stripe.secret.key=your_stripe_secret_key_here